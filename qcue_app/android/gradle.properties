org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Kotlin incremental compilation relativizes plugin sources (in the pub cache)
# against the module build dir; when the pub cache and the project live on
# different Windows drives (C:\…\Pub\Cache vs E:\…\qcue) that relativization
# throws "different roots" and corrupts the incremental cache. Disabling
# incremental Kotlin compilation sidesteps the cross-drive bug; clean builds are
# unaffected and the rebuild cost is negligible for an app this size.
kotlin.incremental=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
