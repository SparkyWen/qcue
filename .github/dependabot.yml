# Keep dependencies and pinned action versions fresh. Grouped + weekly to limit PR noise.
# Commit prefixes are chosen so the generated PR titles pass the Conventional-PR-title check.
version: 2
updates:
  # Rust workspace
  - package-ecosystem: cargo
    directory: /qcue-rs
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Flutter / Dart app
  - package-ecosystem: pub
    directory: /qcue_app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    groups:
      pub-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by these workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - '*'
