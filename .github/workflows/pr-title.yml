# Validate that PR titles follow Conventional Commits, so the squash-merge history
# (PR title becomes the squash commit subject) stays clean and machine-readable.
name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed <type>s — matches the project's existing commit history.
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            release
            revert
          # Scope is optional and free-form (e.g. fix(router): ...). We deliberately do NOT
          # enforce subject casing: that rejects bot PRs such as Dependabot's
          # "build(deps): Bump <dep> ..." (capitalised), and the <type> prefix is the real value.
          requireScope: false
