# QCue — core CI pipeline.
#
# Secret-free by construction: the whole stack runs keyless via StubProvider, and the
# Rust suite needs only ephemeral Postgres/Redis service containers (no API keys, ever).
#
# Path-filtered: Rust jobs skip when only Flutter changed (and vice-versa); a single
# always-run `ci-success` gate aggregates results so branch protection has exactly one
# required check and never gets stuck "pending" on a skipped job.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# New pushes to the same PR/branch cancel superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'qcue-rs/**'
              - '.github/workflows/ci.yml'
            flutter:
              - 'qcue_app/**'
              - '.github/workflows/ci.yml'

  rust-lint:
    name: Rust · clippy + xtask lints
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qcue-rs
    # NOTE: rustfmt is intentionally NOT a gate. The codebase follows a deliberate compact
    # hand-formatted style and is not `cargo fmt`-clean; the project's gates are clippy + xtask
    # (see CLAUDE.md). Adopting rustfmt repo-wide would be a separate, deliberate change.
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain (pinned by rust-toolchain.toml)
        run: rustc --version && cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qcue-rs
      - name: clippy (warnings are errors)
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: xtask — layering-law + protocol-purity lints
        run: cargo run --locked -p xtask

  rust-deny:
    name: Rust · cargo-deny (licenses)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny — license policy (deny.toml)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: qcue-rs/Cargo.toml
          command: check licenses

  rust-test:
    name: Rust · full test suite (Postgres + Redis)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qcue-rs
    env:
      # qcue-rs/.cargo/config.toml force-pins DATABASE_URL to this exact value, so the
      # Postgres service below MUST use role qcue / password qcue_dev / db qcue.
      QCUE_TEST_REDIS: redis://localhost:6379
      RUST_BACKTRACE: 1
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qcue
          POSTGRES_PASSWORD: qcue_dev
          POSTGRES_DB: qcue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qcue -d qcue"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qcue-rs
      - name: cargo test (315+ tests; #[sqlx::test] spins an ephemeral DB per test)
        run: cargo test --locked --workspace

  flutter:
    name: Flutter · format + analyze + test
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qcue_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - name: flutter pub get
        run: flutter pub get
      - name: dart format check (advisory — promote to blocking once confirmed clean)
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true
      - name: flutter analyze
        run: flutter analyze
      - name: flutter test
        run: flutter test

  # Single required status check. Passes only if every needed job succeeded or was
  # legitimately skipped (path-filtered). Configure branch protection to require THIS job.
  ci-success:
    name: CI success
    if: always()
    needs: [changes, rust-lint, rust-deny, rust-test, flutter]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results="${{ needs.changes.result }} ${{ needs.rust-lint.result }} ${{ needs.rust-deny.result }} ${{ needs.rust-test.result }} ${{ needs.flutter.result }}"
          echo "Job results: $results"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::A required job did not succeed (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
