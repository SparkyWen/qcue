name: ✨ Feature request
description: Suggest an idea or improvement for QCue.
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        For larger or architectural changes, please open this issue to discuss **before**
        investing significant effort (see `CONTRIBUTING.md`).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the behavior or UX.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you ruled them out.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Backend (qcue-rs)"
        - "App (qcue_app / Flutter)"
        - "Design system"
        - "Docs"
        - "Not sure"
    validations:
      required: true
