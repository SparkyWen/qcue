# cargo-deny config — license policy gate.
# Run:  cargo deny check licenses
# (advisories/bans/sources are out of scope here; this file gates licenses only.)
#
# `allow` lists exactly the licenses currently present in the dependency tree.
# A new dependency carrying any other license will FAIL this gate on purpose —
# that is the moment to make a conscious add (and update about.toml to match).

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "0BSD",
    "Unlicense",
]
confidence-threshold = 0.8

# Our own 18 workspace crates are application-internal (publish = false) and
# carry no license field — skip them; this gate is for third-party deps only.
[licenses.private]
ignore = true
